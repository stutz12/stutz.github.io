<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: #ffffff;
            border-radius: 18px;
            padding: 34px 30px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.10);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            letter-spacing: -0.2px;
        }

        .header p {
            margin: 0;
            color: #5b6472;
            font-size: 14.5px;
            line-height: 1.5;
        }

        /* subtle divider for structure */
        .divider {
            height: 1px;
            background: rgba(0,0,0,0.06);
            margin: 18px 0 10px 0;
        }

        /* Zigpoll spacing refinement */
        #zigpoll-embed-6a31951bf911ba8324e641fd {
            margin-top: 18px;
        }

        /* small screen optimization */
        @media (max-width: 520px) {
            .card {
                padding: 26px 20px;
                border-radius: 14px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>Quick Survey</h1>
        <p>
            We’re using this feedback to improve the product experience.
            It only takes about a minute.
        </p>
    </div>

    <div class="divider"></div>

    <div id="zigpoll-embed-6a31951bf911ba8324e641fd"></div>

</div>

<script type="application/javascript">
  (function () {
    window.Zigpoll = window.Zigpoll || {};
    window.Zigpoll.accountId = '6a319509f911ba8324e641ea';
    window.Zigpoll.pollId = '6a31951bf911ba8324e641fd';

    var script = document.createElement("script");
    script.type = "text/javascript";
    script.charset = "utf-8";
    script.src = "https://cdn.zigpoll.com/static/js/main.js";
    script.async = true;

    document.head.appendChild(script);
  }());
</script>

</body>
</html>
